services:
  - type: web
    name: inventory-api
    runtime: python
    repo: https://github.com/YOUR_USERNAME/Inventory-Order-Management
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.0"
